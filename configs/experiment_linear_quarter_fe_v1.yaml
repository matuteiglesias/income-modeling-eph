experiment:
  id: linear_quarter_fe_v1
  kind: fixed_effects_study
  random_seed: 42

runtime:
  mode: sweep
  sample_n: 5000

model_design:
  fixed_effects:
    - name: quarter_fe
      columns: [TRIMESTRE]
      max_levels: 8
      drop_first: true

data:
  processed_dataset: data/processed/modeling_dataset.parquet
  split_assignments: data/processed/split_assignments.csv

split:
  train_size: 0.70
  test_size: 0.20
  validation_size: 0.10
  strategy: random_individual
  random_state: 42

cv:
  folds: 3
  scoring: r2
  return_train_score: true

artifacts:
  training_frame_sample_n: 10

models:
  linear_regression:
    enabled: true
    grid:
      reg__fit_intercept: [true]

  ridge:
    enabled: true
    grid:
      reg__alpha: [2]
      reg__fit_intercept: [true]

  lasso:
    enabled: false
    grid: {}

  hist_gradient_boosting:
    enabled: false
    grid: {}

  mlp:
    enabled: false
    grid: {}

outputs:
  model_comparison: reports/tables/model_comparison_linear_quarter_fe_v1.csv
  experiment_card: reports/experiment_cards/linear_quarter_fe_v1.json
  runs_dir: reports/runs

observability:
  heartbeat_seconds: 10
  sklearn_verbose: 2
