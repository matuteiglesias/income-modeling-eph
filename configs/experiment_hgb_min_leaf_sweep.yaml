experiment:
  id: hgb_min_leaf_sweep_v1
  random_seed: 42

runtime:
  mode: sweep
  sample_n: 100000
  allow_full_run: false
  enabled_models:
    - hist_gradient_boosting

data:
  processed_dataset: data/processed/modeling_dataset.parquet
  split_assignments: data/processed/split_assignments.csv

split:
  train_size: 0.70
  test_size: 0.20
  validation_size: 0.10
  strategy: random_individual
  random_state: 42

cv:
  folds: 3
  scoring: r2
  return_train_score: true

diagnostics:
  sweep_type: hgb_single_param
  primary_param: min_samples_leaf

models:
  linear_regression:
    enabled: false
    grid: {}
  ridge:
    enabled: false
    grid: {}
  lasso:
    enabled: false
    grid: {}
  hist_gradient_boosting:
    enabled: true
    grid:
      reg__learning_rate: [0.05]
      reg__max_iter: [200]
      reg__max_leaf_nodes: [31]
      reg__min_samples_leaf: [20, 30, 50, 75, 100, 150, 200, 300]
      reg__l2_regularization: [0.0]
      reg__early_stopping: [false]
  mlp:
    enabled: false
    grid: {}

outputs:
  model_comparison: reports/tables/model_comparison_hgb_min_leaf_sweep.csv
  experiment_card: reports/experiment_cards/hgb_min_leaf_sweep.json
  runs_dir: reports/runs

observability:
  heartbeat_seconds: 10
  sklearn_verbose: 2
