experiment:
  id: hgb_lr_iter_sweep_v1
  random_seed: 42

runtime:
  mode: sweep
  sample_n: 100000
  allow_full_run: false
  enabled_models:
    - hist_gradient_boosting

data:
  processed_dataset: data/processed/modeling_dataset.parquet
  split_assignments: data/processed/split_assignments.csv

split:
  train_size: 0.70
  test_size: 0.20
  validation_size: 0.10
  strategy: random_individual
  random_state: 42

cv:
  folds: 3
  scoring: r2
  return_train_score: true

scientific_notes:
  early_stopping_decision: >-
    HGB targeted sweep sets reg__early_stopping to false so max_iter is interpreted
    as the exact number of boosting iterations rather than an early-stopping upper
    bound inside each GridSearchCV training fold.

diagnostics:
  sweep_type: hgb_lr_iter
  primary_param: max_iter
  group_param: learning_rate

models:
  linear_regression:
    enabled: false
    grid: {}

  ridge:
    enabled: false
    grid: {}

  lasso:
    enabled: false
    grid: {}

  hist_gradient_boosting:
    enabled: true
    grid:
      reg__learning_rate: [0.02, 0.03, 0.05, 0.075, 0.1]
      reg__max_iter: [100, 200, 400, 600]
      reg__max_leaf_nodes: [31]
      reg__min_samples_leaf: [100]
      reg__l2_regularization: [0.0]
      reg__early_stopping: [false]

  mlp:
    enabled: false
    grid: {}

outputs:
  model_comparison: reports/tables/model_comparison_hgb_lr_iter_sweep.csv
  experiment_card: reports/experiment_cards/hgb_lr_iter_sweep.json
  runs_dir: reports/runs

observability:
  heartbeat_seconds: 10
  sklearn_verbose: 2
