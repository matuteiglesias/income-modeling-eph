experiment:
  id: hgb_pilot_v1

data:
  processed_dataset: data/processed/modeling_dataset.parquet
  split_assignments: data/processed/split_assignments.csv


runtime:
  mode: sweep
  sample_n: 50000
  random_state: 42
  enabled_models:
    - ridge
    - hist_gradient_boosting

cv:
  folds: 2
  scoring: r2
  return_train_score: true

observability:
  heartbeat_seconds: 10
  sklearn_verbose: 2

models:
  ridge:
    enabled: true
    grid:
      reg__alpha: [2]

  hist_gradient_boosting:
    enabled: true
    grid:
      reg__learning_rate: [0.05, 0.1, 0.2]
      reg__max_iter: [100, 200]
      reg__max_leaf_nodes: [31, 127]
      reg__min_samples_leaf: [50, 100]
      reg__l2_regularization: [0.0]
      reg__early_stopping: [false]


outputs:
  model_comparison: reports/tables/model_comparison_hgb_pilot.csv
  experiment_card: reports/experiment_cards/hgb_pilot.json